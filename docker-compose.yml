services:
  ollama:
    image: ollama/ollama:latest
    container_name: ollama-standalone
    ports:
      # Isoleret port (11435) for at undgå konflikt med nativ Ollama (11434)
      - "11435:11434"
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped
    entrypoint: ["/bin/sh", "-c", "ollama serve & sleep 10 && ollama pull llama3.2:3b && wait"]

volumes:
  ollama_data:
