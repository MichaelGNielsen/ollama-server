services:
  ollama:
    image: ollama/ollama:latest
    container_name: ollama-standalone
    ports:
      # Isoleret port (11435) for at undgå konflikt med nativ Ollama (11434)
      - "11435:11434"
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped

volumes:
  ollama_data:
